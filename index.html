<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compra USDT</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{background:#081120;color:white;padding:20px}
.container{max-width:1400px;margin:auto}
h1{margin-bottom:10px;font-size:38px}
.subtitle{color:#94a3b8;margin-bottom:20px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;margin-bottom:20px}
.card{background:#111c2e;padding:20px;border-radius:15px}
.card h3{color:#94a3b8;font-size:14px;margin-bottom:10px}
.card .value{font-size:30px;font-weight:bold}
.green{background:#16a34a}
.section{background:#111c2e;padding:20px;border-radius:15px;margin-bottom:20px}
.section h2{margin-bottom:15px}
button{background:#16a34a;border:none;color:white;padding:12px 20px;border-radius:10px;cursor:pointer;font-weight:bold}
button:hover{opacity:.9}
input,select,textarea{width:100%;padding:10px;border:none;border-radius:8px;background:#0b1322;color:white}
table{width:100%;border-collapse:collapse}
th{background:#1e293b;padding:12px;text-align:left}
td{padding:10px;border-bottom:1px solid #1e293b}
.status-green{background:rgba(34,197,94,.15)}
.status-red{background:rgba(239,68,68,.15)}
.status-yellow{background:rgba(234,179,8,.15)}
.bank-card{background:#0b1322;padding:15px;border-radius:10px;margin-bottom:10px}
textarea{height:250px}
.top-buttons{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px}
.red-btn{background:#ef4444}
.blue-btn{background:#38bdf8;color:black}
</style>
</head>

<body>
<div class="container">

<h1>Calculadora UYU → USDT</h1>
<div class="subtitle">Sistema multiusuario conectado a Supabase</div>

<div class="cards">
  <div class="card">
    <h3>Saldo total</h3>
    <div class="value" id="totalBalance">$0</div>
  </div>

  <div class="card green">
    <h3>Disponible para USDT</h3>
    <div class="value" id="availableUSDT">$0</div>
  </div>

  <div class="card">
    <h3>Reserva final</h3>
    <div class="value" id="finalReserve">$0</div>
  </div>

  <div class="card">
    <h3>Cuentas</h3>
    <div class="value" id="totalAccounts">0</div>
  </div>
</div>

<div class="section">
  <h2>Configuración</h2>
  <table>
    <tr>
      <td>Saldo mínimo por cuenta</td>
      <td><input id="minAccount" value="10000"></td>
    </tr>
    <tr>
      <td>Reserva total obligatoria</td>
      <td><input id="globalReserve" value="150000"></td>
    </tr>
  </table>
</div>

<div class="section">
  <h2>Cuentas</h2>

  <div class="top-buttons">
    <button onclick="addAccount()">+ Agregar Cuenta</button>
    <button class="blue-btn" onclick="saveAllAccounts()">Guardar Online</button>
    <button class="blue-btn" onclick="loadAccounts()">Actualizar</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Cuenta</th>
        <th>Banco</th>
        <th>Saldo</th>
        <th>Disponible</th>
        <th>Queda</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="accountsBody"></tbody>
  </table>

  <br>
  <button onclick="calculate()">CALCULAR</button>
</div>

<div class="section">
  <h2>Totales por banco</h2>
  <div id="bankTotals"></div>
</div>

<div class="section">
  <h2>Mensaje listo</h2>
  <button onclick="copyMessage()">Copiar</button>
  <br><br>
  <textarea id="message"></textarea>
</div>

</div>

<script>
const SUPABASE_URL = 'https://fqttuhgkdeydgmnzjfzn.supabase.co';

const SUPABASE_KEY = 'sb_publishable_gqVQgVk468ZyPDmYqHO-IQ_mAa66SDs';

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let accounts = [];

function formatMoney(value){
  return new Intl.NumberFormat('es-UY',{
    minimumFractionDigits:2,
    maximumFractionDigits:2
  }).format(value || 0).replace(/^/,'$');
}

function parseMoney(value){
  if(!value) return 0;

  let raw = String(value)
    .replace(/\$/g,'')
    .replace(/\s/g,'');

  if(raw.includes(',') && raw.includes('.')){
    raw = raw.replace(/\./g,'').replace(',', '.');
  } else if(raw.includes(',')){
    raw = raw.replace(',', '.');
  }

  return Number(raw) || 0;
}

function renderAccounts(){
  const body = document.getElementById('accountsBody');
  body.innerHTML = '';

  accounts.forEach((acc,index)=>{
    const tr = document.createElement('tr');
    tr.className = acc.status || '';

    tr.innerHTML = `
      <td>
        <input value="${acc.cuenta || ''}" onchange="updateField(${index},'cuenta',this.value)">
      </td>

      <td>
        <select onchange="updateField(${index},'banco',this.value)">
          <option ${acc.banco==='Prex'?'selected':''}>Prex</option>
          <option ${acc.banco==='Mi Dinero'?'selected':''}>Mi Dinero</option>
          <option ${acc.banco==='Itaú'?'selected':''}>Itaú</option>
          <option ${acc.banco==='Santander'?'selected':''}>Santander</option>
          <option ${acc.banco==='BBVA'?'selected':''}>BBVA</option>
          <option ${acc.banco==='Oca Blue'?'selected':''}>Oca Blue</option>
        </select>
      </td>

      <td>
        <input value="${acc.saldo || ''}" onchange="updateField(${index},'saldo',this.value)">
      </td>

      <td>${formatMoney(acc.available || 0)}</td>
      <td>${formatMoney(acc.remaining || parseMoney(acc.saldo))}</td>

      <td>
        <button class="red-btn" onclick="deleteAccount(${index})">X</button>
      </td>
    `;

    body.appendChild(tr);
  });

  document.getElementById('totalAccounts').innerText = accounts.length;
}

function updateField(index,field,value){
  accounts[index][field] = value;
}

function addAccount(){
  accounts.push({
    id:null,
    titular:'',
    cuenta:'',
    banco:'Prex',
    saldo:'',
    available:0,
    remaining:0,
    status:'status-red'
  });

  renderAccounts();
}

function calculate(){
  const min = parseMoney(document.getElementById('minAccount').value);
  const reserve = parseMoney(document.getElementById('globalReserve').value);

  let total = 0;

  accounts.forEach(acc=>{
    total += parseMoney(acc.saldo);
  });

  let availableGlobal = total - reserve;

  if(availableGlobal < 0){
    availableGlobal = 0;
  }

  accounts = accounts.map(acc=>{
    const balance = parseMoney(acc.saldo);
    let available = 0;
    let status = 'status-red';

    if(balance > min){
      available = balance - min;

      if(available > availableGlobal){
        available = availableGlobal;
      }

      availableGlobal -= available;

      if(available > 0){
        status = 'status-green';
      } else {
        status = 'status-yellow';
      }
    }

    return {
      ...acc,
      available,
      remaining: balance - available,
      status
    };
  });

  renderAccounts();
  renderTotals();
}

function renderTotals(){
  let totalBalance = 0;
  let totalAvailable = 0;
  let totalReserve = 0;
  let bankTotals = {};

  accounts.forEach(acc=>{
    const balance = parseMoney(acc.saldo);

    totalBalance += balance;
    totalAvailable += acc.available || 0;
    totalReserve += acc.remaining || 0;

    if(!bankTotals[acc.banco]){
      bankTotals[acc.banco] = {
        total:0,
        accounts:[]
      };
    }

    bankTotals[acc.banco].total += acc.available || 0;

    if(acc.available > 0){
      bankTotals[acc.banco].accounts.push(acc);
    }
  });

  document.getElementById('totalBalance').innerText = formatMoney(totalBalance);
  document.getElementById('availableUSDT').innerText = formatMoney(totalAvailable);
  document.getElementById('finalReserve').innerText = formatMoney(totalReserve);

  const bankDiv = document.getElementById('bankTotals');
  bankDiv.innerHTML = '';

  let message = `📌 Totales por banco para compra de USDT\n\n`;

  for(let bank in bankTotals){
    const item = bankTotals[bank];

    const div = document.createElement('div');
    div.className = 'bank-card';
    div.innerHTML = `
      <strong>${bank}</strong><br>
      Disponible: ${formatMoney(item.total)}
    `;

    bankDiv.appendChild(div);

    if(item.total > 0){
      message += `🔹 ${bank.toUpperCase()}\n\n`;

      item.accounts.forEach(acc=>{
        message += `• ${acc.cuenta}: ${formatMoney(acc.available)}\n`;
      });

      message += `\nTOTAL ${bank.toUpperCase()}: ${formatMoney(item.total)}\n\n──────────────\n\n`;
    }
  }

  message += `💰 TOTAL GENERAL PARA COMPRAR USDT: ${formatMoney(totalAvailable)}`;

  document.getElementById('message').value = message;
}

function copyMessage(){
  const text = document.getElementById('message');
  text.select();
  document.execCommand('copy');
  alert('Mensaje copiado');
}

async function saveAllAccounts(){
  for(const acc of accounts){
    const payload = {
      titular: acc.titular || '',
      cuenta: acc.cuenta || '',
      banco: acc.banco || '',
      saldo: parseMoney(acc.saldo),
      updated_at: new Date().toISOString()
    };

    if(acc.id){
      await supabaseClient
        .from('accounts')
        .update(payload)
        .eq('id', acc.id);
    } else {
      await supabaseClient
        .from('accounts')
        .insert(payload);
    }
  }

  alert('Datos guardados online 🚀');
  await loadAccounts();
}

async function loadAccounts(){
  const { data, error } = await supabaseClient
    .from('accounts')
    .select('*')
    .order('id', { ascending:true });

  if(error){
    console.log(error);
    alert('Error cargando datos desde Supabase');
    return;
  }

  accounts = (data || []).map(acc=>({
    id: acc.id,
    titular: acc.titular || '',
    cuenta: acc.cuenta || '',
    banco: acc.banco || 'Prex',
    saldo: acc.saldo || '',
    available:0,
    remaining:parseMoney(acc.saldo),
    status:'status-red'
  }));

  calculate();
}

async function deleteAccount(index){
  const acc = accounts[index];

  if(acc.id){
    await supabaseClient
      .from('accounts')
      .delete()
      .eq('id', acc.id);
  }

  accounts.splice(index,1);

  calculate();
}

loadAccounts();
</script>

</body>
</html>
